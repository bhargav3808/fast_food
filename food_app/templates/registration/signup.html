{% extends 'food_app/base.html' %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-body">
          <h3 class="text-center mb-4 text-warning">Sign Up</h3>
          <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="text-center">
              <button type="submit" class="btn btn-warning w-100 text-white fw-bold">Create Account</button>
            </div>
          </form>
          <div class="mt-3 text-center">
            <p>Already have an account? <a href="{% url 'login' %}" class="text-warning fw-bold">Login</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
